cache_path: results/embeddings/flexict-zs_radchest.pt
device: null

loader:
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: radchestct
  json_path: ${oc.env:RADCHEST_ROOT}/json/monai_dict_refined.json   # 92-label refined superset; filter at eval
  id_key: NoteAcc_DEID
  npz_key: ct
  max_samples: 0
  metadata_csv: ${oc.env:RADCHEST_ROOT}/CT_Scan_Metadata_Complete_35747.csv
  spacing_column: final_spacing

model:
  name: flexict
  # Same VLM encoder, project=true -> 1024-d L2-normalized projection for ZS.
  variant: vlm
  project: true
  axcodes: LPS
  spacing: [2.0, 2.0, 2.0]
  roi: 160
  use_amp: true
