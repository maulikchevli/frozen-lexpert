cache_path: results/embeddings/ctclip_radchest.pt
device: null

loader:
  # Same input shape as CT-SSG; similar worker cost.
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: radchestct
  json_path: ${oc.env:RADCHEST_ROOT}/json/monai_dict.json
  id_key: NoteAcc_DEID
  npz_key: ct
  max_samples: 0
  metadata_csv: ${oc.env:RADCHEST_ROOT}/CT_Scan_Metadata_Complete_35747.csv
  spacing_column: final_spacing

model:
  name: ctclip
  # Authors' canonical inference pipeline (CT-CLIP/scripts/data_inference_nii.py).
  input_shape: [240, 480, 480]
  target_spacing: [1.5, 0.75, 0.75]
  hu_range: [-1000.0, 1000.0]
