cache_path: results/embeddings/ctfm_ctrate.pt
device: null

loader:
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: ctrate
  labels_csv: ${oc.env:CTRATE_ROOT}/reports/valid_predicted_labels.csv
  data_dir: ${oc.env:CTRATE_ROOT}/validation
  metadata_csv: ${oc.env:CTRATE_META}
  max_samples: 0

model:
  name: ctfm
  patch_size: [24, 128, 128]
  overlap: 0.0
  batch_size: 16
  target_spacing: [3.0, 1.0, 1.0]
  hu_range: [-1024.0, 2048.0]
