cache_path: results/embeddings/ctssg_radchest.pt
device: null                # null -> auto (cuda if available)

loader:
  # CT-SSG needs substantial CPU work per sample (reorient + anisotropic
  # resample + crop/pad to 240x480x480). Keep prefetch deep so workers can
  # refill the queue while GPU runs the forward.
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: radchestct
  json_path: ${oc.env:RADCHEST_ROOT}/json/monai_dict.json
  id_key: NoteAcc_DEID
  npz_key: ct
  max_samples: 0                # 0 -> use all
  metadata_csv: ${oc.env:RADCHEST_ROOT}/CT_Scan_Metadata_Complete_35747.csv
  spacing_column: final_spacing

model:
  name: ctssg
  repo_path: third_party/ct-ssg
  # Authors' canonical input shape, spacing, and intensity range (see paper §4).
  input_size: 480
  slice_count: 240
  target_spacing: [1.5, 0.75, 0.75]     # (S, L, P) mm
  hu_range: [-1000.0, 200.0]
  imagenet_mean: 0.449
