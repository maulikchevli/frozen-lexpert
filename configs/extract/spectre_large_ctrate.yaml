cache_path: results/embeddings/spectre-large_ctrate.pt
device: null

loader:
  num_workers: 12
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: ctrate
  labels_csv: ${oc.env:CTRATE_ROOT}/reports/valid_predicted_labels.csv
  data_dir: ${oc.env:CTRATE_ROOT}/validation
  metadata_csv: ${oc.env:CTRATE_META}
  max_samples: 0

model:
  name: spectre
  model_config: spectre-large-pretrained
  patch_size: [128, 128, 64]
  grid_size: [3, 3, 4]
  target_spacing: [0.75, 0.75, 1.5]
  target_shape: [384, 384, 256]
  use_amp: true
