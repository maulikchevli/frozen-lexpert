cache_path: results/embeddings/ctfm_radchest.pt
device: null

loader:
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

dataset:
  name: radchestct
  json_path: ${oc.env:RADCHEST_ROOT}/json/monai_dict.json
  id_key: NoteAcc_DEID
  npz_key: ct
  max_samples: 0
  metadata_csv: ${oc.env:RADCHEST_ROOT}/CT_Scan_Metadata_Complete_35747.csv
  spacing_column: final_spacing

model:
  name: ctfm
  # Authors' canonical transforms (CT-FM/scripts/feature_extractor.py).
  # Sliding window over (24, 128, 128) patches with no overlap; mean-pool across patches.
  patch_size: [24, 128, 128]
  overlap: 0.0
  batch_size: 16
  target_spacing: [3.0, 1.0, 1.0]
  hu_range: [-1024.0, 2048.0]
