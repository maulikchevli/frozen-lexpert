cache_path: results/embeddings/colipri-crm_radchest.pt
device: null
num_workers: 8    # legacy; loader.num_workers overrides

loader:
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true

# COLIPRI owns its entire preprocessing pipeline (reorient, resample, HU clamp,
# rescale, crop/pad) via TorchIO. We do NOT apply any GPU or CPU preprocessing
# here — the dataset passes raw HU float tensors straight through.
preprocess:
  on_gpu: false
  hu_clip: null
  normalize: none

dataset:
  name: radchestct
  json_path: ${oc.env:RADCHEST_ROOT}/json/monai_dict.json
  id_key: NoteAcc_DEID
  npz_key: ct
  target_shape: null
  max_samples: 0
  # Required for COLIPRI: per-sample isotropic voxel spacing.
  metadata_csv: ${oc.env:RADCHEST_ROOT}/CT_Scan_Metadata_Complete_35747.csv
  spacing_column: final_spacing

model:
  name: colipri
  pool: true
  project: true
  normalize: true
  input_size: null     # null -> COLIPRI default (192)
  spacing_mm: null     # null -> COLIPRI default (2.0 mm)
