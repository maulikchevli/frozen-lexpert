output_dir: results/knn_eval/compare_models_ctrate

eval:
  k: 5
  weighting: distance
  threshold: 0.5
  strategy: kfold
  folds: 5
  test_frac: 0.2
  n_repeats: 1
  seed: 42
  n_boot: 1000

embeddings:
  - name: spectre-large
    path: results/embeddings/spectre-large_ctrate.pt
  - name: ctssg
    path: results/embeddings/ctssg_ctrate.pt
  - name: ctclip
    path: results/embeddings/ctclip_ctrate.pt
  - name: colipri-crm
    path: results/embeddings/colipri-crm_ctrate.pt
  - name: ctfm
    path: results/embeddings/ctfm_ctrate.pt
  - name: curia2
    path: results/embeddings/curia2_ctrate.pt
  - name: voxelfm
    path: results/embeddings/voxelfm_ctrate.pt
  - name: flexict
    path: results/embeddings/flexict_ctrate.pt
  - name: flexict3d
    path: results/embeddings/flexict3d_ctrate.pt
  - name: merlin
    path: results/embeddings/merlin_ctrate.pt
  - name: pillar0
    path: results/embeddings/pillar0_ctrate.pt
